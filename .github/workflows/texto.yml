name: Ingesta texto de leyes (pirámide Fase 2)

# Mantiene tc_law_articles al día con los PDFs oficiales de LeyesBiblio
# para el lote prioritario de leyes. Corre cada martes y a mano.

on:
  schedule:
    - cron: '0 9 * * 2'      # martes 09:00 UTC
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Slugs coma-separados (vacío = lote prioritario)'
        type: string
        default: ''

jobs:
  texto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt
      - name: Probar el parser (self-test)
        run: python scripts/ingest_texto.py --selftest
      - name: Ingerir texto
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/ingest_texto.py --slugs "${{ github.event.inputs.slugs }}"
