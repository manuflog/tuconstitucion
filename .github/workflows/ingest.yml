name: Ingesta CPEUM (texto oficial)

# Mantiene tc_articles al día con el texto vigente de la Cámara de Diputados.
# Corre cada lunes y también se puede lanzar a mano desde la pestaña Actions.

on:
  schedule:
    - cron: '0 9 * * 1'      # lunes 09:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Reprocesar todos los artículos aunque la fecha no cambie'
        type: boolean
        default: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt
      - name: Probar el parser (self-test)
        run: python scripts/ingest_cpeum.py --selftest
      - name: Ingerir texto vigente
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/ingest_cpeum.py ${{ github.event.inputs.force == 'true' && '--force' || '' }}
